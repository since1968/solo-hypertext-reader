<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solo Hypertext Reader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="reader">
    <main id="entry" class="entry entered" aria-live="polite" tabindex="-1">
      <div class="entry-number">Loading</div>
      <div class="entry-body"><p>Loading adventure&hellip;</p></div>
    </main>
  </div>
  <button id="start-over" type="button">Start Over</button>
  <script src="app.js" defer></script>
</body>
</html>
